services:
  - type: web
    name: api
    env: node
    buildCommand: cd apps/api && pnpm install && pnpm exec prisma generate && pnpm build
    startCommand: cd apps/api && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: manager-tool-db
          property: DATABASE_URL
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WEB_URL
        fromService:
          name: web

  - type: web
    name: web
    env: node
    buildCommand: cd apps/web && pnpm install && pnpm build
    startCommand: cd apps/web && pnpm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: api
          property: HTTPS_URL

databases:
  - name: manager-tool-db
    plan: free
    postgreVersion: "15"
